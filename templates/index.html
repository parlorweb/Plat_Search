<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plat Search</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; }
    .section { margin-bottom: 1.25rem; }
    .row { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
    input { padding: 0.5rem; min-width: 260px; }
    button { padding: 0.5rem 0.75rem; }
    #status { margin: 0.75rem 0; min-height: 1.25rem; }
    table { border-collapse: collapse; width: 100%; max-width: 900px; }
    th, td { border: 1px solid #ddd; padding: 0.5rem; text-align: left; }
    th { background: #f4f4f4; }
  </style>
</head>
<body>
  <h1>Plate Name Search</h1>

  <div class="section">
    <div class="row">
      <label for="searchInput">Search names</label>
      <input id="searchInput" type="text" placeholder="Enter a search term" />
      <button id="searchBtn" type="button">Search</button>
    </div>
  </div>

  <div class="section">
    <div class="row">
      <label for="nameInput">New name</label>
      <input id="nameInput" type="text" placeholder="Enter name to reserve" />
      <button id="availabilityBtn" type="button">Check availability</button>
      <button id="reserveBtn" type="button">Reserve name</button>
    </div>
  </div>

  <p id="status" aria-live="polite"></p>

  <div class="section">
    <h2>Results</h2>
    <table>
      <thead>
        <tr>
          <th>Name</th>
        </tr>
      </thead>
      <tbody id="resultsBody"></tbody>
    </table>
  </div>

  <script src="/static/app.js" defer></script>
</body>
</html>
